<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Smart Farming 360</title>
    <meta
      name="description"
      content="You're offline. Smart Farming 360 will reconnect when your network is back."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f2;
        --panel: rgba(255, 255, 255, 0.92);
        --text: #12311a;
        --muted: #5d6d62;
        --brand: #0d5415;
        --accent: #f59e0b;
        --shadow: 0 30px 60px rgba(13, 84, 21, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(245, 158, 11, 0.14), transparent 35%),
          radial-gradient(circle at bottom left, rgba(13, 84, 21, 0.12), transparent 40%),
          var(--bg);
        color: var(--text);
      }

      .offline-shell {
        width: min(100%, 560px);
        background: var(--panel);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(13, 84, 21, 0.08);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 36px 32px;
      }

      .offline-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 8px 14px;
        background: rgba(13, 84, 21, 0.08);
        color: var(--brand);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.02em;
      }

      .offline-art {
        width: 88px;
        height: 88px;
        margin: 24px 0 18px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(13, 84, 21, 0.14), rgba(245, 158, 11, 0.18));
      }

      .offline-art img {
        width: 56px;
        height: 56px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 6vw, 42px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 16px;
      }

      .offline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .btn {
        border: none;
        border-radius: 14px;
        padding: 14px 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--brand), #1b7e28);
        color: #fff;
        box-shadow: 0 18px 30px rgba(13, 84, 21, 0.24);
      }

      .btn-secondary {
        background: rgba(13, 84, 21, 0.08);
        color: var(--brand);
      }

      .offline-footnote {
        margin-top: 22px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="offline-shell">
      <div class="offline-eyebrow">Offline Ready</div>
      <div class="offline-art">
        <img src="/icons/icon-192.png" alt="Smart Farming 360" />
      </div>
      <h1>You are offline</h1>
      <p>
        Smart Farming 360 can still open the app shell and previously cached pages.
        Reconnect to refresh products, orders, and account data.
      </p>
      <div class="offline-actions">
        <button class="btn btn-primary" onclick="window.location.reload()">
          Try again
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='/'">
          Go home
        </button>
      </div>
      <div class="offline-footnote">
        Live data such as orders and account changes require an active connection.
      </div>
    </main>
  </body>
</html>
