<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Smart Farming 360</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f3f4f6;
      color: #0a3d0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .offline-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 2rem 2.5rem;
      text-align: center;
    }
    .offline-title {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #10B981;
    }
    .offline-desc {
      margin-bottom: 1.5rem;
      color: #555;
    }
    .retry-btn {
      background: #10B981;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background: #0a3d0a;
    }
    .offline-img {
      width: 120px;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <img src="/icons/icon-192x192.png" alt="Offline" class="offline-img" />
    <div class="offline-title">You’re Offline</div>
    <div class="offline-desc">No internet connection detected.<br />You can still browse cached content or try again when you’re back online.</div>
    <button class="retry-btn" onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
