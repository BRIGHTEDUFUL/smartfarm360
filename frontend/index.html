<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Viewport and Platform Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />
    <meta name="theme-color" content="#0D5415" />
    <meta name="description" content="Connect farmers and consumers across Ghana's 16 regions. Fresh produce, livestock, and agricultural products delivered to your doorstep." />
    
    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Smart Farming 360" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0D5415" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Android Chrome -->
    <meta name="theme-color" content="#0D5415" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D5415" media="(prefers-color-scheme: dark)" />
    
    <!-- Disable automatic detection -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="date=no" />
    <meta name="format-detection" content="address=no" />
    <meta name="format-detection" content="email=no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    
    <title>Smart Farming 360 - Ghana's Agricultural Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
