<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Viewport and Platform Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />
    <meta name="theme-color" content="#0D5415" />
    <meta name="description" content="Connect farmers and consumers across Ghana's 16 regions. Fresh produce, livestock, and agricultural products delivered to your doorstep. Shop offline with our PWA." />
    <meta name="keywords" content="Ghana farming, agriculture marketplace, fresh produce, local farmers, farm to table, Ghana food delivery, agricultural products, organic farming" />
    
    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Smart Farming 360" />
    
    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png" />

    <link rel="apple-touch-startup-image" href="/splash/iphone5_splash.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />

    <link rel="apple-touch-startup-image" href="/splash/iphonex_splash.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />

    <link rel="apple-touch-startup-image" href="/splash/iphonexsmax_splash.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />

    <meta name="msapplication-TileColor" content="#0D5415" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Android Chrome -->
    <meta name="theme-color" content="#0D5415" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D5415" media="(prefers-color-scheme: dark)" />
    
    <!-- Disable automatic detection -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="date=no" />
    <meta name="format-detection" content="address=no" />
    <meta name="format-detection" content="email=no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartfarming360.com/" />
    <meta property="og:title" content="Smart Farming 360 - Ghana's Agricultural Marketplace" />
    <meta property="og:description" content="Connect farmers and consumers across Ghana's 16 regions. Fresh produce delivered to your doorstep." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    
    <!-- Twitter -->

    <meta property="twitter:title" content="Smart Farming 360 - Ghana's Agricultural Marketplace" />
    <meta property="twitter:description" content="Connect farmers and consumers across Ghana's 16 regions. Fresh produce delivered to your doorstep." />
    <meta property="twitter:image" content="/icons/icon-512x512.png" />
